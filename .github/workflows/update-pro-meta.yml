name: Update Pro Meta

on:
  schedule:
    - cron: "30 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-pro-meta:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: gdown installieren
        run: pip install gdown

      - name: Aktuelle Oracle's-Elixir-CSV herunterladen
        run: |
          mkdir -p data/oe
          gdown "1hnpbrUpBMS1TZI7IovfpKeZfWJH1Aptm" -O "data/oe/2026_LoL_esports_match_data_from_OraclesElixir.csv"

      - name: Pro-Meta-Datei erzeugen
        run: node scripts/update-pro-meta.js
        env:
          INPUT_FILE: data/oe/2026_LoL_esports_match_data_from_OraclesElixir.csv

      - name: Änderungen committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet pro-meta.json; then
            echo "Keine Änderungen an pro-meta.json"
            exit 0
          fi

          git add pro-meta.json
          git commit -m "Update pro play meta"
          git push
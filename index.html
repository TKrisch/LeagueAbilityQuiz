<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>League Ability Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>League Ability Quiz</h1>

    <p id="question"></p>

    <img id="abilityIcon" width="64" height="64" alt="Ability Icon">

    <input id="answerInput" placeholder="Name der Fähigkeit">
    <button id="checkButton">Prüfen</button>
    <button id="nextButton" style="display: none;">Nächste Frage</button>

    <p id="result"></p>
    <p id="correctAnswer"></p>
    <p id="score"></p>
  </main>

  <script src="script.js"></script>
</body>
</html>

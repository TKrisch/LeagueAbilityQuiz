name: Update Pro Meta

on:
  schedule:
    - cron: "30 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-pro-meta:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Pro-Meta-Datei erzeugen
        run: node scripts/update-pro-meta.js

      - name: Änderungen committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet pro-meta.json; then
            echo "Keine Änderungen an pro-meta.json"
            exit 0
          fi

          git add pro-meta.json
          git commit -m "Update pro play meta"
          git push